                if (!Array.isArray(txs)) txs = [];
            }
        } catch (e) {
            txs = [];
        }

        let chart = null;
        let saveTimeout = null;
        let isSaving = false;

        // ============================================================
        // 4. PERSISTENT STORAGE - AUTO SAVE
        // ============================================================
        function saveData() {
            try {
                localStorage.setItem('trackmon_transactions', JSON.stringify(txs));
                localStorage.setItem('trackmon_lang', lang);
                localStorage.setItem('trackmon_currency', mainCurr);
                localStorage.setItem('trackmon_theme', isDark ? 'dark' : 'light');

                const indicator = document.getElementById('saveIndicator');
                if (indicator) {
                    indicator.className = 'save-indicator saved';
                    indicator.title = _('dataSaved');
                }
                isSaving = false;
                return true;
            } catch (e) {
                console.error('Save error:', e);
                return false;
            }
        }

        function triggerSave() {
            if (saveTimeout) clearTimeout(saveTimeout);
            const indicator = document.getElementById('saveIndicator');
            if (indicator) {
                indicator.className = 'save-indicator saving';
                indicator.title = _('saving');
            }
            isSaving = true;
            saveTimeout = setTimeout(() => {
                saveData();
                saveTimeout = null;
            }, 500);
        }

        setInterval(() => {
            if (isSaving) saveData();
        }, 5000);

        window.addEventListener('beforeunload', () => saveData());
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) saveData();
        });

        // ============================================================
        // 5. EXCHANGE RATES
        // ============================================================
        const rates = {
            IDR: 1,
            USD: 16000,
            EUR: 17500,
            JPY: 110,
            CNY: 2200,
            MYR: 3500,
            SAR: 4200,
            SGD: 12000,
            GBP: 20500,
            AUD: 10500
        };

        const GEMINI_KEY = 'AIzaSyDd3g_wv3nNzGInZvjJ9yLtz2Hn01xqEts';

        // ============================================================
        // 6. HELPERS
        // ============================================================
        function _(key, vars = {}) {
            let text = t[lang]?.[key] || t['id']?.[key] || key;
            for (let k in vars) text = text.replace(`{${k}}`, vars[k]);
            return text;
        }

        function convert(amount, from, to) {
            if (from === to) return parseFloat(amount);
            let base = rates[from] || 1;
            let target = rates[to] || 1;
            return parseFloat(amount) * (target / base);
        }

        function fmt(amount, curr = mainCurr) {
            let sym = curr === 'IDR' ? 'Rp' : curr;
            return `${sym} ${parseFloat(amount).toLocaleString('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
        }

        function modal(title, text, type = 'info') {
            const el = document.getElementById('modal');
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-text').textContent = text;
            const icon = document.getElementById('modal-icon');
            const map = {
                success: 'bg-emerald-500/20 text-emerald-400',
                error: 'bg-red-500/20 text-red-400',
                info: 'bg-blue-500/20 text-blue-400'
            };
            const icons = {
                success: 'check-circle',
                error: 'alert-triangle',
                info: 'info'
            };
            icon.className =
                `mx-auto flex items-center justify-center h-14 w-14 rounded-full ${map[type] || map.info}`;
            icon.innerHTML = `<i data-lucide="${icons[type] || icons.info}" class="w-7 h-7"></i>`;
            el.classList.remove('hidden');
            document.getElementById('modal-btn').onclick = () => el.classList.add('hidden');
            lucide.createIcons();
        }

        function changeLang(l) {
            lang = l;
            triggerSave();
            document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
            render();
        }

        function changeTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-theme', !isDark);
            triggerSave();
            render();
        }

        function changeCurrency(c) {
            mainCurr = c;
            triggerSave();
            render();
        }

        // ============================================================
        // 7. RENDER
        // ============================================================
        const app = document.getElementById('app');

        function render() {
            let inc = 0,
                exp = 0;
            txs.forEach(tx => {
                let v = convert(tx.amount, tx.currency || 'IDR', mainCurr);
                if (tx.type === 'income') inc += v;
                else exp += v;
            });
            let bal = inc - exp;

            const cats = {};
            txs.forEach(tx => {
                const c = tx.category || 'Lainnya';
                if (!cats[c]) cats[c] = { inc: 0, exp: 0, count: 0 };
                let v = convert(tx.amount, tx.currency || 'IDR', mainCurr);
                if (tx.type === 'income') cats[c].inc += v;
                else cats[c].exp += v;
                cats[c].count++;
            });

            let analysis = [];
            let totalExp = 0;
            Object.entries(cats).forEach(([c, d]) => {
                totalExp += d.exp;
            });
            Object.entries(cats).forEach(([c, d]) => {
                if (d.exp > 0 && totalExp > 0) {
                    let pct = (d.exp / totalExp) * 100;
                    analysis.push({ category: c, amount: d.exp, percent: pct, count: d.count });
                }
            });
            analysis.sort((a, b) => b.amount - a.amount);

            const tips = {
                'Makanan': 'Coba masak sendiri di rumah, kurangi makan di luar. Belanja bahan makanan di pasar tradisional lebih murah.',
                'Transportasi': 'Gunakan transportasi umum atau carpool. Jika memungkinkan, gunakan sepeda untuk jarak dekat.',
                'Belanja': 'Buat daftar belanja sebelum pergi ke toko. Hindari belanja impulsif. Tunggu diskon untuk barang non-darurat.',
                'Tagihan': 'Matikan lampu dan perangkat elektronik yang tidak digunakan. Gunakan peralatan hemat energi.',
                'Hiburan': 'Cari alternatif hiburan gratis seperti taman, perpustakaan, atau streaming gratis. Batasi langganan berbayar.',
                'Kesehatan': 'Jaga pola makan sehat dan olahraga teratur untuk mengurangi biaya kesehatan. Beli obat generik jika memungkinkan.',
                'Pendidikan': 'Manfaatkan sumber belajar gratis online. Beli buku bekas atau pinjam dari perpustakaan.',
                'Lainnya': 'Evaluasi kembali kebutuhan vs keinginan. Tunda pembelian yang tidak mendesak.'
            };

            const defaultTip = 'Evaluasi kembali pengeluaran Anda. Tanyakan apakah ini benar-benar kebutuhan atau hanya keinginan.';
            let topWaste = analysis.length > 0 ? analysis[0] : null;
            let tipText = topWaste ? (tips[topWaste.category] || defaultTip) : '';

            const isLight = !isDark;

            app.innerHTML = `
                <!-- HEADER -->
                <div class="glass rounded-2xl p-4 mb-4 animate-in">
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div class="flex items-center gap-3">
                            <div class="p-2.5 rounded-xl bg-emerald-500/20 text-emerald-400">
                                <i data-lucide="wallet" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 class="text-xl font-black"><span class="gradient-text">${_('appName')}</span></h1>
                                <span class="text-[9px] text-gray-500 tracking-wider">✦ v${APP_VERSION}</span>
                                <span class="text-[9px] text-gray-600 ml-2">
                                    <span id="saveIndicator" class="save-indicator saved" title="${_('dataSaved')}"></span>
                                </span>
                            </div>
                        </div>
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <select onchange="changeCurrency(this.value)" class="input-glass text-sm py-1.5 px-3 w-auto" style="padding-right:32px">
                                ${Object.keys(rates).map(c => `<option value="${c}" ${c === mainCurr ? 'selected' : ''}>${c}</option>`).join('')}
                            </select>
                            <select onchange="changeLang(this.value)" class="input-glass text-sm py-1.5 px-3 w-auto" style="padding-right:32px">
                                <option value="id" ${lang === 'id' ? 'selected' : ''}>🇮🇩 Indonesia</option>
                                <option value="en" ${lang === 'en' ? 'selected' : ''}>🇬🇧 English</option>
                                <option value="ar" ${lang === 'ar' ? 'selected' : ''}>🇸🇦 العربية</option>
                                <option value="zh" ${lang === 'zh' ? 'selected' : ''}>🇨🇳 中文</option>
                                <option value="ja" ${lang === 'ja' ? 'selected' : ''}>🇯🇵 日本語</option>
                                <option value="th" ${lang === 'th' ? 'selected' : ''}>🇹🇭 ไทย</option>
                            </select>
                            <button onclick="changeTheme()" class="btn-glass py-1.5 px-3 text-sm">
                                <i data-lucide="${isDark ? 'sun' : 'moon'}" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- STATS -->
                <div class="grid grid-cols-3 gap-3 mb-4">
                    ${[
                        { label: _('balance'), value: fmt(bal, mainCurr), icon: 'wallet', color: 'text-emerald-400' },
                        { label: _('income'), value: fmt(inc, mainCurr), icon: 'arrow-up-circle', color: 'text-emerald-400' },
                        { label: _('expense'), value: fmt(exp, mainCurr), icon: 'arrow-down-circle', color: 'text-red-400' }
                    ].map((s, i) => `
                        <div class="stat-card animate-in" style="animation-delay:${i*0.05}s">
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">${s.label}</span>
                                <i data-lucide="${s.icon}" class="w-3.5 h-3.5 ${s.color} opacity-60"></i>
                            </div>
                            <div class="text-lg font-black text-white mt-0.5">${s.value}</div>
                        </div>
                    `).join('')}
                </div>

                <!-- CHART + ITEMS -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div class="glass rounded-2xl p-4 md:col-span-2">
                        <h3 class="text-sm font-bold text-white mb-2">${_('chart')}</h3>
                        <div class="h-48 flex items-center justify-center">
                            <canvas id="chartCanvas" class="max-w-full max-h-full"></canvas>
                        </div>
                    </div>
                    <div class="glass rounded-2xl p-4">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-sm font-bold text-white">${_('items')}</h3>
                            <span class="text-[10px] text-gray-500">${Object.keys(cats).length}</span>
                        </div>
                        <div class="item-grid max-h-[180px] overflow-y-auto no-scrollbar">
                            ${Object.entries(cats).slice(0, 8).map(([c, d]) => `
                                <div class="item-card">
                                    <div class="text-xs font-semibold text-white truncate">${c}</div>
                                    <div class="text-[11px] font-bold ${d.inc - d.exp >= 0 ? 'text-emerald-400' : 'text-red-400'}">
                                        ${fmt(d.inc - d.exp, mainCurr)}
                                    </div>
                                    <div class="flex justify-center gap-2 text-[9px] text-gray-500">
                                        <span class="text-emerald-400">↑${fmt(d.inc, mainCurr).replace(/[^0-9,]/g,'')}</span>
                                        <span class="text-red-400">↓${fmt(d.exp, mainCurr).replace(/[^0-9,]/g,'')}</span>
                                    </div>
                                </div>
                            `).join('')}
                            ${Object.keys(cats).length === 0 ? `<div class="col-span-full text-center text-gray-500 text-xs py-4">${_('noTx')}</div>` : ''}
                        </div>
                    </div>
                </div>

                <!-- ANALYSIS -->
                <div class="glass rounded-2xl p-4 mb-4">
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="trending-up" class="w-5 h-5 text-red-400"></i>
                        <h3 class="text-sm font-bold text-white">${_('analysis')}</h3>
                    </div>
                    ${txs.length < 3 ? `
                        <div class="text-center text-gray-500 text-sm py-4">${_('noData')}</div>
                    ` : `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <div class="text-xs text-gray-400 mb-2">${_('mostWasteful')}</div>
                                ${analysis.slice(0, 5).map((a, i) => `
                                    <div class="flex items-center justify-between py-1.5 border-b border-white/5">
                                        <span class="text-sm text-white">${i+1}. ${a.category}</span>
                                        <div class="flex items-center gap-2">
                                            <span class="text-sm font-bold text-red-400">${fmt(a.amount, mainCurr)}</span>
                                            <span class="text-xs text-gray-500">${a.percent.toFixed(1)}%</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            <div>
                                ${topWaste ? `
                                    <div class="analysis-card">
                                        <div class="flex items-center gap-2">
                                            <span class="text-red-400 text-lg">⚠️</span>
                                            <span class="text-sm font-bold text-white">${topWaste.category}</span>
                                            <span class="text-xs text-gray-400">${topWaste.percent.toFixed(1)}%</span>
                                        </div>
                                        <div class="text-xs text-gray-400 mt-1">
                                            ${_('totalSpending')}: ${fmt(topWaste.amount, mainCurr)} · ${topWaste.count} transaksi
                                        </div>
                                        <div class="saving-tip">
                                            <div class="text-xs font-semibold text-emerald-400">${_('savingTip')}</div>
                                            <div class="text-xs text-gray-300 mt-0.5">${tipText}</div>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `}
                </div>

                <!-- TRANSACTIONS -->
                <div class="glass rounded-2xl p-4">
                    <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
                        <h3 class="text-sm font-bold text-white">${_('transactions')}</h3>
                        <div class="flex items-center gap-2">
                            <button onclick="toggleScan()" class="btn-glass flex items-center gap-1.5 text-sm">
                                <i data-lucide="camera" class="w-4 h-4"></i> ${_('scan')}
                            </button>
                            <button onclick="toggleForm()" class="btn-primary text-sm px-3 py-1.5">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div id="scanOptions" class="hidden glass-light rounded-xl p-2 mb-3 flex gap-2 flex-wrap">
                        <button onclick="scan('camera')" class="btn-glass text-sm flex-1">📷 ${_('camera')}</button>
                        <button onclick="scan('gallery')" class="btn-glass text-sm flex-1">🖼️ ${_('gallery')}</button>
                        <button onclick="scan('document')" class="btn-glass text-sm flex-1">📄 ${_('doc')}</button>
                    </div>

                    <form id="txForm" onsubmit="addTx(event)" class="hidden glass-light rounded-xl p-3 mb-3 animate-in">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <select id="txType" class="input-glass text-sm py-2">
                                    <option value="expense">${_('expenseLabel')}</option>
                                    <option value="income">${_('incomeLabel')}</option>
                                </select>
                            </div>
                            <div>
                                <select id="txCurrency" class="input-glass text-sm py-2">
                                    ${Object.keys(rates).map(c => `<option value="${c}" ${c === mainCurr ? 'selected' : ''}>${c}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="mt-2">
                            <input type="number" id="txAmount" required step="0.01" placeholder="${_('amount')}" class="input-glass">
                        </div>
                        <div class="mt-2">
                            <input type="date" id="txDate" required class="input-glass">
                        </div>
                        <div class="mt-2">
                            <input type="text" id="txCategory" required placeholder="${_('catPlaceholder')}" class="input-glass">
                        </div>
                        <div class="mt-2">
                            <input type="text" id="txNote" required placeholder="${_('notePlaceholder')}" class="input-glass">
                        </div>
                        <button type="submit" class="btn-primary w-full mt-3 text-sm py-2.5">${_('save')}</button>
                    </form>

                    <div class="max-h-[300px] overflow-y-auto space-y-1.5">
                        ${txs.length === 0 ? `
                            <div class="text-center text-gray-500 text-sm py-6">${_('noTx')}</div>
                        ` : [...txs].reverse().map((tx, i) => {
                            let v = convert(tx.amount, tx.currency || 'IDR', mainCurr);
                            return `
                                <div class="tx-item animate-in" style="animation-delay:${i*0.03}s">
                                    <div class="flex items-center justify-between gap-2">
                                        <div class="flex-1 min-w-0">
                                            <div class="font-semibold text-white text-sm truncate">${tx.note}</div>
                                            <div class="flex items-center gap-2 text-[10px] text-gray-500">
                                                <span class="px-1.5 py-0.5 bg-white/5 rounded">${tx.category}</span>
                                                <span>${tx.date}</span>
                                                <span>${tx.currency}</span>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <span class="font-bold text-sm ${tx.type === 'income' ? 'text-emerald-400' : 'text-red-400'}">
                                                ${tx.type === 'income' ? '+' : '-'} ${fmt(v, mainCurr)}
                                            </span>
                                            <button onclick="delTx('${tx.id}')" class="text-gray-500 hover:text-red-400 transition p-1">
                                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <!-- FOOTER -->
                <div class="footer-brand mt-4">
                    ${_('poweredBy')} 
                    ${AI_ASSISTED ? '🤖' : ''}
                    <span class="mx-1">·</span>
                    v${APP_VERSION}
                </div>
            `;

            const d = document.getElementById('txDate');
            if (d) d.value = new Date().toISOString().split('T')[0];

            setTimeout(() => renderChart(inc, exp), 100);
            lucide.createIcons();
        }

        // ============================================================
        // 8. CHART
        // ============================================================
        function renderChart(income, expense) {
            const ctx = document.getElementById('chartCanvas');
            if (!ctx) return;
            if (chart) chart.destroy();

            const isLight = !isDark;
            const textColor = isLight ? '#4a4a6a' : '#9ca3af';

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: [_('income'), _('expense')],
                    datasets: [{
                        data: [income || 1, expense || 0],
                        backgroundColor: ['rgba(16,185,129,0.7)', 'rgba(239,68,68,0.7)'],
                        borderColor: ['#10b981', '#ef4444'],
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: textColor,
                                boxWidth: 10,
                                padding: 12,
                                font: { size: 10, weight: '600' },
                                usePointStyle: true
                            }
                        }
                    }
                }
            });
        }

        // ============================================================
        // 9. TRANSACTIONS
        // ============================================================
        function toggleForm() {
            const f = document.getElementById('txForm');
            f.classList.toggle('hidden');
        }

        function addTx(e) {
            e.preventDefault();
            const tx = {
                id: 'tx_' + Date.now(),
                type: document.getElementById('txType').value,
                currency: document.getElementById('txCurrency').value,
                amount: parseFloat(document.getElementById('txAmount').value),
                date: document.getElementById('txDate').value,
                category: document.getElementById('txCategory').value.trim() || 'Lainnya',
                note: document.getElementById('txNote').value.trim() || 'Tanpa keterangan'
            };
            txs.push(tx);
            triggerSave();
            document.getElementById('txForm').classList.add('hidden');
            modal('✅', _('scanSuccess'), 'success');
            render();
        }

        function delTx(id) {
            if (confirm(_('deleteConfirm'))) {
                txs = txs.filter(t => t.id !== id);
                triggerSave();
                render();
            }
        }

        // ============================================================
        // 10. SCAN STRUK
        // ============================================================
        function toggleScan() {
            document.getElementById('scanOptions').classList.toggle('hidden');
        }

        function scan(mode) {
            document.getElementById('scanOptions').classList.add('hidden');
            const input = document.createElement('input');
            input.type = 'file';
            if (mode === 'camera') {
                input.capture = 'environment';
                input.accept = 'image/*';
            } else if (mode === 'gallery') {
                input.accept = 'image/*';
            } else {
                input.accept = 'image/*,.pdf,.doc,.docx';
            }
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) processScan(file);
            };
            input.click();
        }

        async function processScan(file) {
            if (!navigator.onLine) {
                modal('⚠️', _('noInternet'), 'error');
                return;
            }
            modal('⏳', _('scanning'), 'info');

            try {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    const mime = file.type;

                    const res = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    role: 'user',
                                    parts: [
                                        { text: 'Ekstrak total amount (angka), category (Makanan/Transportasi/Belanja/Tagihan/Hiburan/Kesehatan/Pendidikan/Lainnya), dan note (nama toko). Format JSON: { "amount": number, "category": string, "note": string }' },
                                        { inlineData: { mimeType: mime, data: base64 } }
                                    ]
                                }],
                                generationConfig: { responseMimeType: 'application/json' }
                            })
                        });

                    const data = await res.json();
                    if (data.candidates && data.candidates.length > 0) {
                        const result = JSON.parse(data.candidates[0].content.parts[0].text);
                        document.getElementById('txAmount').value = result.amount || '';
                        document.getElementById('txCategory').value = result.category || '';
                        document.getElementById('txNote').value = result.note || '';
                        document.getElementById('modal').classList.add('hidden');
                        document.getElementById('txForm').classList.remove('hidden');
                        modal('✅', _('scanSuccess'), 'success');
                    } else {
                        modal('❌', _('scanError'), 'error');
                    }
                };
            } catch (err) {
                modal('❌', _('scanError'), 'error');
            }
        }

        // ============================================================
        // 11. INIT
        // ============================================================
        document.body.classList.toggle('light-theme', !isDark);
        render();

        setTimeout(() => {
            const indicator = document.getElementById('saveIndicator');
            if (indicator) {
                indicator.className = 'save-indicator saved';
                indicator.title = _('dataSaved');
            }
        }, 1000);

        document.addEventListener('click', (e) => {
            const opt = document.getElementById('scanOptions');
            if (opt && !opt.classList.contains('hidden')) {
                if (!e.target.closest('#scanOptions') && !e.target.closest('.btn-glass')) {
                    opt.classList.add('hidden');
                }
            }
        });

        console.log(`🚀 ${APP_NAME} v${APP_VERSION} by ${DEVELOPER}`);
        console.log('🤖 AI Assisted: Yes');
        console.log('💾 Data saved to localStorage');
    </script>
</body>
</html>
